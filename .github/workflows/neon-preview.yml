name: Neon Preview Database

on:
  workflow_dispatch:
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

concurrency:
  group: neon-preview-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  setup:
    name: Setup
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      branch_name: ${{ steps.branch_name.outputs.current_branch }}
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

  create_neon_branch:
    name: Create Neon Branch
    needs: setup
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest
    outputs:
      db_url: ${{ steps.create_neon_branch.outputs.db_url }}
      db_url_with_pooler: ${{ steps.create_neon_branch.outputs.db_url_with_pooler }}
      branch_id: ${{ steps.create_neon_branch.outputs.branch_id }}
      branch_name: ${{ steps.create_neon_branch.outputs.branch_name }}
    steps:
      - name: Set branch expiration date
        run: echo "EXPIRES_AT=$(date -u --date '+14 days' +'%Y-%m-%dT%H:%M:%SZ')" >> "$GITHUB_ENV"

      - name: Create Neon branch
        id: create_neon_branch
        uses: neondatabase/create-branch-action@v6
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch_name: preview/pr-${{ github.event.pull_request.number || github.run_number }}-${{ needs.setup.outputs.branch_name }}
          api_key: ${{ secrets.NEON_API_KEY }}
          expires_at: ${{ env.EXPIRES_AT }}

  preview_validation:
    name: Preview Validation
    needs: create_neon_branch
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest

    services:
      redis:
        image: redis:7.4-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      NODE_ENV: test
      APP_NAME: banking-platform-api
      APP_VERSION: neon-preview
      APP_COMMIT_SHA: ${{ github.sha }}
      PORT: 4000
      API_PREFIX: api
      CORS_ORIGIN: http://localhost:3000
      COOKIE_NAME: session
      COOKIE_SECRET: ci-cookie-secret-ci-cookie-secret-1234
      COOKIE_SECURE: false
      SESSION_IDLE_TIMEOUT_MINUTES: 15
      SESSION_ABSOLUTE_TIMEOUT_HOURS: 8
      REAUTH_WINDOW_MINUTES: 5
      DATABASE_URL: ${{ needs.create_neon_branch.outputs.db_url_with_pooler }}
      DIRECT_DATABASE_URL: ${{ needs.create_neon_branch.outputs.db_url }}
      REDIS_URL: redis://127.0.0.1:6379
      REDIS_KEY_PREFIX: platform
      AUTH_MAX_FAILED_ATTEMPTS: 5
      AUTH_LOCKOUT_MINUTES: 15
      AUTH_RATE_LIMIT_WINDOW_MINUTES: 10
      AUTH_LOGIN_RATE_LIMIT_MAX_ATTEMPTS: 10
      AUTH_REAUTH_RATE_LIMIT_MAX_ATTEMPTS: 5
      MFA_SETUP_TTL_MINUTES: 10
      MFA_VERIFY_MAX_ATTEMPTS: 5
      MFA_VERIFY_WINDOW_MINUTES: 10
      MFA_VERIFY_LOCKOUT_MINUTES: 15
      MFA_ENCRYPTION_KEY: ci-mfa-secret-ci-mfa-secret-ci-mfa-1234
      AUDIT_FAIL_CLOSED_DEFAULT: false
      AUDIT_FAIL_CLOSED_ACTION_PREFIXES: sessions.,payments.create.success,invoices.create.success,invoices.stamp.success,invoices.cancel.success,auth.mfa.setup.created,auth.mfa.verify.success,auth.mfa.recovery_codes.regenerated,auth.mfa.disabled,auth.mfa.admin_reset.success
      HTTP_SLOW_REQUEST_THRESHOLD_MS: 1000
      ALLOW_DEGRADED_STARTUP: false
      PAC_PROVIDER: mock
      PAC_ALLOW_MOCK_IN_PRODUCTION: false
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: ChangeMeNow_123456789!
      ADMIN_NAME: Neon Preview Admin

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Build
        run: npm run build

      - name: Test
        run: npm run test

      - name: Lint
        run: npm run lint

      - name: Apply migrations to Neon preview branch
        run: npm run prisma:migrate:deploy

      - name: Seed admin
        run: npm run seed:admin

      - name: Start API
        shell: bash
        run: |
          nohup npm --workspace apps/api run start > api.log 2>&1 &
          echo $! > api.pid
          for attempt in $(seq 1 45); do
            if curl -fsS http://127.0.0.1:4000/api/health/live > /dev/null; then
              exit 0
            fi
            sleep 2
          done
          cat api.log
          exit 1

      - name: Smoke tests against Neon preview branch
        shell: pwsh
        run: ./scripts/smoke-test.ps1 -BaseUrl 'http://127.0.0.1:4000' -Mode full

      - name: Print API logs
        if: always()
        shell: bash
        run: |
          if [ -f api.log ]; then
            cat api.log
          fi

      - name: Stop API
        if: always()
        shell: bash
        run: |
          if [ -f api.pid ]; then
            kill "$(cat api.pid)" || true
          fi

  browser_e2e:
    name: Browser E2E
    if: github.event_name != 'pull_request' || github.event.action != 'closed'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma client
        run: npm run prisma:generate

      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Run WebAuthn browser E2E
        run: npm run e2e:webauthn

      - name: Stop isolated lab infrastructure
        if: always()
        run: npm run infra:down -- -RemoveVolumes -BestEffort

  delete_neon_branch:
    name: Delete Neon Branch
    if: github.event_name == 'pull_request' && github.event.action == 'closed'
    runs-on: ubuntu-latest
    steps:
      - name: Get branch name
        id: branch_name
        uses: tj-actions/branch-names@v8

      - name: Delete Neon branch
        uses: neondatabase/delete-branch-action@v3
        with:
          project_id: ${{ vars.NEON_PROJECT_ID }}
          branch: preview/pr-${{ github.event.pull_request.number }}-${{ steps.branch_name.outputs.current_branch }}
          api_key: ${{ secrets.NEON_API_KEY }}
